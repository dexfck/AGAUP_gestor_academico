<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + React</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #f1f5f9; /* Tailwind slate-100 */
      }
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #f1f5f9;
        z-index: 9999;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #cbd5e1; /* slate-300 */
        border-top-color: #1d4ed8; /* blue-700 */
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .loader-text {
        color: #1e293b; /* slate-800 */
        font-weight: 600;
        font-size: 1.125rem;
      }
      .loader-subtext {
        color: #64748b; /* slate-500 */
        font-size: 0.875rem;
        margin-top: 4px;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="spinner"></div>
        <div class="loader-text">Gestión Académica</div>
        <div class="loader-subtext">Cargando aplicación...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
